# Runs the dev-natif API in a container, mounting the host Docker socket so the
# API can drive the local Docker Engine, and a named volume for the SQLite DB.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dev-natif-api:latest
    container_name: dev-natif-api
    ports:
      - "8080:8080"
    environment:
      NATIF_PORT: "8080"
      NATIF_DB_PATH: "/data/natif.db"
      NATIF_LOG_LEVEL: "info"
      # The API talks to the engine through the mounted socket.
      NATIF_DOCKER_HOST: "unix:///var/run/docker.sock"
      # Authentication (token JWT). Change the credentials and set a stable secret.
      NATIF_AUTH_ENABLED: "true"
      NATIF_AUTH_USERNAME: "admin"
      NATIF_AUTH_PASSWORD: "admin"        # CHANGE ME
      # NATIF_JWT_SECRET: "change-me-long-random"   # else a random one is generated per start
      NATIF_TOKEN_TTL: "1h"
      # Retention: purge events/history older than N days (0 = keep forever).
      NATIF_RETENTION_DAYS: "30"
    volumes:
      # Host Docker socke<t -> lets the API control the local engine.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for project/deployment data.
      - natif-data:/data
    restart: unless-stopped

volumes:
  natif-data:
